<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dadi</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0D0D0F;
    --surface: #1A1A1D;
    --surf2: #222226;
    --gold: #D4AF37;
    --gold-dim: rgba(212,175,55,0.15);
    --red: #C41E3A;
    --red-dim: rgba(196,30,58,0.15);
    --green: #4ADE80;
    --amber: #FBB924;
    --blue: #60A5FA;
    --text: #F0F0F0;
    --muted: rgba(255,255,255,0.45);
    --border: rgba(255,255,255,0.08);
    --radius: 12px;
    --font: -apple-system, "SF Pro Display", "Segoe UI", sans-serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }
  body { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
  #root { width: 100%; max-width: 430px; min-height: 100vh; position: relative; background: var(--bg); overflow: hidden; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }
  @keyframes slide-up {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes count-up {
    from { transform: translateY(8px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes sheet-up {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  @keyframes overlay-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes spin-die {
    0% { transform: rotate(0deg) scale(0.8); opacity: 0; }
    60% { transform: rotate(720deg) scale(1.1); }
    100% { transform: rotate(720deg) scale(1); opacity: 1; }
  }

  /* Tweaks panel */
  #tweaks-panel {
    display: none;
    position: fixed;
    bottom: 160px;
    right: 12px;
    width: 220px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    z-index: 9999;
    font-family: var(--font);
  }
  #tweaks-panel.visible { display: block; }
  #tweaks-panel h3 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .tweak-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .tweak-row label { font-size: 12px; color: var(--text); }
  .tweak-row select, .tweak-row input[type=range] { background: var(--surf2); border: 0.5px solid var(--border); color: var(--text); border-radius: 6px; padding: 3px 6px; font-size: 11px; }
  .tweak-toggle { width: 36px; height: 20px; background: var(--surf2); border-radius: 10px; position: relative; cursor: pointer; border: 0.5px solid var(--border); transition: background 0.2s; }
  .tweak-toggle.on { background: var(--gold); }
  .tweak-toggle::after { content: ''; position: absolute; left: 3px; top: 3px; width: 14px; height: 14px; border-radius: 50%; background: white; transition: transform 0.2s; }
  .tweak-toggle.on::after { transform: translateX(16px); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Design tokens ───────────────────────────────────────────
const T = {
  bg: '#0D0D0F', surface: '#1A1A1D', surf2: '#222226',
  gold: '#D4AF37', goldDim: 'rgba(212,175,55,0.15)',
  red: '#C41E3A', redDim: 'rgba(196,30,58,0.15)',
  green: '#4ADE80', amber: '#FBB924', blue: '#60A5FA',
  text: '#F0F0F0', muted: 'rgba(255,255,255,0.45)',
  border: 'rgba(255,255,255,0.08)',
};

const PLAYER_COLORS = [T.blue, T.gold, T.green, T.amber, T.red, '#A78BFA'];

// ─── Mock initial state ───────────────────────────────────────
const INIT_PLAYERS = [
  { id: 1, name: 'Marco', color: PLAYER_COLORS[0] },
  { id: 2, name: 'Luca',  color: PLAYER_COLORS[1] },
  { id: 3, name: 'Ale',   color: PLAYER_COLORS[2] },
  { id: 4, name: 'Gio',   color: PLAYER_COLORS[3] },
];

// Derive balance, wins, losses from rounds + base players
const deriveStats = (basePlayers, rounds) => {
  const stats = Object.fromEntries(basePlayers.map(p => [p.id, { balance: 0, wins: 0, losses: 0 }]));
  rounds.forEach(r => {
    const minScore = Math.min(...r.results.map(x => x.score));
    // If tiebreaker was played, the actual winner is marked with tiebreakerWinner
    const winners = r.results.some(x=>x.tiebreakerWinner)
      ? r.results.filter(x=>x.tiebreakerWinner)
      : r.results.filter(x => x.score === minScore);
    const losers  = r.results.filter(x => !winners.find(w=>w.pid===x.pid));
    const payout  = r.stake * losers.length / winners.length * r.multiplier;
    const debit   = r.stake * r.multiplier;
    winners.forEach(w => {
      if (stats[w.pid]) { stats[w.pid].balance += payout; stats[w.pid].wins += 1; }
    });
    losers.forEach(l => {
      if (stats[l.pid]) { stats[l.pid].balance -= debit; stats[l.pid].losses += 1; }
    });
  });
  return basePlayers.map(p => ({
    ...p,
    balance: +stats[p.id].balance.toFixed(2),
    wins:    stats[p.id].wins,
    losses:  stats[p.id].losses,
  }));
};

const INIT_ROUNDS = [
  { id: 1, multiplier: 1,  results: [{pid:1,dice:3,score:3},{pid:2,dice:11,score:11},{pid:3,dice:7,score:7},{pid:4,dice:9,score:9}], stake:2 },
  { id: 2, multiplier: 2,  results: [{pid:1,dice:8,score:8},{pid:2,dice:2,score:2},{pid:3,dice:13,score:13},{pid:4,dice:6,score:6}], stake:2 },
  { id: 3, multiplier: 3,  results: [{pid:1,dice:1,score:1},{pid:2,dice:12,score:12},{pid:3,dice:5,score:5},{pid:4,dice:14,score:14}], stake:2 },
  { id: 4, multiplier: 5,  results: [{pid:1,dice:9,score:9},{pid:2,dice:4,score:4},{pid:3,dice:0,score:0},{pid:4,dice:11,score:11}], stake:2 },
  { id: 5, multiplier: 10, results: [{pid:1,dice:2,score:2},{pid:2,dice:15,score:15},{pid:3,dice:8,score:8},{pid:4,dice:13,score:13}], stake:2 },
];

// ─── Shared primitives ────────────────────────────────────────
const Label = ({children, style={}}) => (
  <span style={{fontSize:11,fontWeight:500,textTransform:'uppercase',letterSpacing:'0.08em',color:T.muted,...style}}>
    {children}
  </span>
);

const Card = ({children, style={}, onClick}) => (
  <div onClick={onClick} style={{
    background:T.surface, border:`0.5px solid ${T.border}`,
    borderRadius:12, padding:'1rem 1.125rem', ...style,
    cursor: onClick ? 'pointer' : undefined,
  }}>{children}</div>
);

const Btn = ({children, variant='primary', onClick, style={}, disabled}) => {
  const base = {
    display:'flex', alignItems:'center', justifyContent:'center',
    gap:8, height:48, minWidth:48, padding:'0 20px',
    borderRadius:8, border:'none', cursor: disabled ? 'not-allowed' : 'pointer',
    fontSize:15, fontWeight:600, fontFamily:'var(--font)',
    transition:'opacity 0.15s, transform 0.1s',
    opacity: disabled ? 0.4 : 1,
    WebkitTapHighlightColor: 'transparent',
    ...style,
  };
  const variants = {
    primary: { background: T.gold, color: T.bg },
    secondary: { background: 'rgba(255,255,255,0.08)', color: T.text },
    ghost: { background: 'transparent', color: T.muted },
    danger: { background: T.redDim, color: T.red },
  };
  return (
    <button disabled={disabled} onClick={onClick} style={{...base,...variants[variant]}}
      onMouseDown={e => { if(!disabled) e.currentTarget.style.transform='scale(0.96)'; }}
      onMouseUp={e => { e.currentTarget.style.transform='scale(1)'; }}
      onTouchStart={e => { if(!disabled) e.currentTarget.style.transform='scale(0.96)'; }}
      onTouchEnd={e => { e.currentTarget.style.transform='scale(1)'; }}>
      {children}
    </button>
  );
};

const MultiBadge = ({ mult }) => {
  const cfg = {
    1:  { bg:'rgba(255,255,255,0.06)', color:T.muted,  dot:false },
    2:  { bg:'rgba(96,165,250,0.12)',  color:T.blue,  dot:false },
    3:  { bg:`rgba(251,185,36,0.12)`,  color:T.amber, dot:true,  dotColor:T.amber },
    5:  { bg:T.goldDim,               color:T.gold,  dot:true,  dotColor:T.gold },
    10: { bg:T.redDim,                color:T.red,   dot:true,  dotColor:T.red },
  }[mult] || { bg:'rgba(255,255,255,0.06)', color:T.muted, dot:false };
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:5,
      padding:'3px 10px', borderRadius:99,
      background:cfg.bg, color:cfg.color,
      fontSize:12, fontWeight:700,
    }}>
      {cfg.dot && (
        <span style={{
          width:6, height:6, borderRadius:3, background:cfg.dotColor,
          animation:'pulse-dot 1.4s ease-in-out infinite',
          display:'inline-block',
        }}/>
      )}
      ×{mult}
    </span>
  );
};

const DieFace = ({ value, size=40, animated=false }) => {
  const isSpecial = value === 18;
  const color = isSpecial ? T.gold : value === 0 ? T.green : value >= 13 ? T.red : value >= 9 ? T.amber : value >= 5 ? T.text : T.muted;
  const borderColor = isSpecial ? T.gold : 'rgba(255,255,255,0.08)';
  return (
    <svg width={size} height={size} viewBox="0 0 100 100"
      style={{ animation: animated ? 'spin-die 0.6s cubic-bezier(0.22,1,0.36,1) forwards' : undefined }}>
      <rect x="5" y="5" width="90" height="90" rx="18" fill={isSpecial ? 'rgba(212,175,55,0.15)' : T.surf2} stroke={borderColor} strokeWidth={isSpecial?2.5:1.5}/>
      {isSpecial && <rect x="5" y="5" width="90" height="90" rx="18" fill="none" stroke={T.gold} strokeWidth="1" opacity="0.3"/>}
      <text x="50" y={isSpecial?58:65} textAnchor="middle" fontSize={isSpecial?36:value >= 10 ? 42 : 48} fontWeight="700"
        fill={color} fontFamily="-apple-system, SF Pro Display, Segoe UI, sans-serif"
        style={{fontVariantNumeric:'tabular-nums'}}>
        {isSpecial ? '−1' : value}
      </text>
      {isSpecial && <text x="50" y="78" textAnchor="middle" fontSize="12" fill={T.gold} opacity="0.8" fontWeight="600">★18</text>}
    </svg>
  );
};

const Stepper = ({ value, onChange, min=1, max=6 }) => (
  <div style={{display:'flex', alignItems:'center', gap:12}}>
    <button onClick={() => onChange(Math.max(min, value-1))} style={{
      width:44, height:44, borderRadius:8, background:T.goldDim,
      border:`0.5px solid ${T.gold}`, color:T.gold,
      fontSize:20, fontWeight:700, cursor:'pointer',
      display:'flex', alignItems:'center', justifyContent:'center',
      WebkitTapHighlightColor:'transparent',
    }}>−</button>
    <span style={{
      fontSize: value===18 ? 28 : 40, fontWeight:700, minWidth:48, textAlign:'center',
      fontVariantNumeric:'tabular-nums',
      color: value===18 ? T.gold : value===0 ? T.green : T.text,
    }}>
      {value===18 ? '−1★' : value}
    </span>
    <button onClick={() => onChange(Math.min(max, value+1))} style={{
      width:44, height:44, borderRadius:8, background:T.goldDim,
      border:`0.5px solid ${T.gold}`, color:T.gold,
      fontSize:20, fontWeight:700, cursor:'pointer',
      display:'flex', alignItems:'center', justifyContent:'center',
      WebkitTapHighlightColor:'transparent',
    }}>+</button>
  </div>
);

// ─── Helper: trova il vincitore corretto (gestisce spareggio) ──
const getRoundWinner = (round, players) => {
  const res = round.results;
  const winnerResult = res.some(x=>x.tiebreakerWinner)
    ? res.find(x=>x.tiebreakerWinner)
    : res.reduce((b,c)=>c.score<b.score?c:b);
  return players.find(p=>p.id===winnerResult?.pid);
};

// ─── Bottom Nav ───────────────────────────────────────────────
const NAV_ITEMS = [
  { id:'game',    icon: GameIcon,    label:'Partita' },
  { id:'stats',   icon: StatsIcon,   label:'Stats' },
  { id:'profile', icon: ProfileIcon, label:'Profilo' },
  { id:'settings',icon: SettingsIcon,label:'Config' },
];

function GameIcon({active}) {
  return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?T.gold:T.muted} strokeWidth="2" strokeLinecap="round">
    <rect x="3" y="3" width="18" height="18" rx="4"/>
    <circle cx="8.5" cy="8.5" r="1.5" fill={active?T.gold:T.muted} stroke="none"/>
    <circle cx="15.5" cy="8.5" r="1.5" fill={active?T.gold:T.muted} stroke="none"/>
    <circle cx="15.5" cy="15.5" r="1.5" fill={active?T.gold:T.muted} stroke="none"/>
    <circle cx="8.5" cy="15.5" r="1.5" fill={active?T.gold:T.muted} stroke="none"/>
    <circle cx="12" cy="12" r="1.5" fill={active?T.gold:T.muted} stroke="none"/>
  </svg>;
}
function StatsIcon({active}) {
  return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?T.gold:T.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
  </svg>;
}
function ProfileIcon({active}) {
  return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?T.gold:T.muted} strokeWidth="2" strokeLinecap="round">
    <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
  </svg>;
}
function SettingsIcon({active}) {
  return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?T.gold:T.muted} strokeWidth="2" strokeLinecap="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
  </svg>;
}

const BottomNav = ({ active, onChange }) => (
  <nav style={{
    position:'fixed', bottom:0, left:'50%', transform:'translateX(-50%)',
    width:'100%', maxWidth:430,
    background: T.bg,
    borderTop:`0.5px solid ${T.border}`,
    display:'flex', zIndex:100,
    paddingBottom:'env(safe-area-inset-bottom, 8px)',
  }}>
    {NAV_ITEMS.map(({id, icon: Icon, label}) => (
      <button key={id} onClick={() => onChange(id)} style={{
        flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
        gap:4, padding:'10px 0 8px',
        background:'none', border:'none', cursor:'pointer',
        WebkitTapHighlightColor:'transparent',
      }}>
        <Icon active={active===id}/>
        <span style={{fontSize:10, fontWeight:active===id?600:400, color: active===id?T.gold:T.muted, letterSpacing:'0.03em'}}>
          {label}
        </span>
      </button>
    ))}
  </nav>
);

// ─── Screen: Game Dashboard ───────────────────────────────────
const GameScreen = ({ players, rounds, stake, onNewRound, onEditRound }) => {
  const sorted = [...players].sort((a,b) => b.balance - a.balance);
  const leader = sorted[0];
  const lastRound = rounds[rounds.length-1];

  return (
    <div style={{padding:'0 16px', paddingBottom:100, animation:'slide-up 0.3s ease'}}>
      {/* Header */}
      <div style={{paddingTop:56, paddingBottom:20}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
          <div>
            <Label>Round in corso</Label>
            <div style={{fontSize:28, fontWeight:700, marginTop:2, fontVariantNumeric:'tabular-nums'}}>
              {rounds.length + 1}
            </div>
          </div>
          {/* Partite giocate */}
          <div style={{textAlign:'center'}}>
            <Label>Partite</Label>
            <div style={{fontSize:28, fontWeight:700, marginTop:2, color:T.blue, fontVariantNumeric:'tabular-nums'}}>
              {rounds.length}
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <Label>Posta</Label>
            <div style={{fontSize:28, fontWeight:700, marginTop:2, color:T.gold, fontVariantNumeric:'tabular-nums'}}>
              €{(stake * players.length).toFixed(2)}
            </div>
          </div>
        </div>
      </div>

      {/* F1 Leaderboard */}
      <Label>Classifica</Label>
      <div style={{marginTop:8, display:'flex', flexDirection:'column', gap:2}}>
        {sorted.map((p, i) => {
          const isLeader = i === 0;
          const delta = lastRound ? lastRound.results.find(r=>r.pid===p.id) : null;
          return (
            <div key={p.id} style={{
              display:'flex', alignItems:'center', gap:0,
              background: isLeader ? `rgba(212,175,55,0.04)` : T.surface,
              border:`0.5px solid ${isLeader ? 'rgba(212,175,55,0.2)' : T.border}`,
              borderRadius:i===0?'12px 12px 4px 4px' : i===sorted.length-1?'4px 4px 12px 12px':'4px',
              overflow:'hidden',
              animation:`slide-up ${0.1 + i*0.07}s ease both`,
            }}>
              {/* Colored bar */}
              <div style={{width:3, alignSelf:'stretch', background:p.color, flexShrink:0}}/>
              {/* Rank */}
              <div style={{
                width:32, textAlign:'center',
                fontSize:11, fontWeight:700, color: i===0?T.gold:T.muted,
                padding:'14px 0',
              }}>P{i+1}</div>
              {/* Name */}
              <div style={{flex:1, padding:'14px 0', fontSize:16, fontWeight:600}}>{p.name}</div>
              {/* Wins */}
              <div style={{padding:'14px 8px', fontSize:11, color:T.muted}}>{p.wins}W</div>
              {/* Balance */}
              <div style={{
                padding:'14px 16px', textAlign:'right',
                fontSize:18, fontWeight:700, fontVariantNumeric:'tabular-nums',
                color: p.balance >= 0 ? T.green : T.red,
              }}>
                {p.balance >= 0 ? '+' : ''}{p.balance.toFixed(2)}
              </div>
            </div>
          );
        })}
      </div>

      {/* Last round summary */}
      {lastRound && (
        <div style={{marginTop:20}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
            <Label>Ultimo round #{lastRound.id}</Label>
            <div style={{display:'flex', gap:8, alignItems:'center'}}>
              <MultiBadge mult={lastRound.multiplier}/>
              <button onClick={()=>onEditRound(lastRound)} style={{
                padding:'6px 14px', borderRadius:8, fontSize:13, fontWeight:600,
                background:'rgba(255,255,255,0.08)', border:`0.5px solid ${T.border}`,
                color:T.text, cursor:'pointer', WebkitTapHighlightColor:'transparent',
              }}>Modifica</button>
            </div>
          </div>
          <Card>
            <div style={{display:'flex', justifyContent:'space-around'}}>
              {lastRound.results.map(r => {
                const p = players.find(p=>p.id===r.pid);
                const roundWinner = getRoundWinner(lastRound, players);
                const isWinner = roundWinner?.id === r.pid;
                return (
                  <div key={r.pid} style={{textAlign:'center', display:'flex', flexDirection:'column', alignItems:'center', gap:6}}>
                    <span style={{fontSize:11, fontWeight:600, color: T.muted}}>{p?.name}</span>
                    <DieFace value={r.dice} size={36}/>
                    {isWinner && <span style={{width:6, height:6, borderRadius:3, background:T.gold, display:'block'}}/>}
                  </div>
                );
              })}
            </div>
          </Card>
        </div>
      )}

      {/* Round history mini */}
      {rounds.length > 1 && (
        <div style={{marginTop:20}}>
          <Label style={{marginBottom:8, display:'block'}}>Storico round</Label>
          <div style={{display:'flex', gap:6, overflowX:'auto', paddingBottom:4}}>
            {[...rounds].reverse().slice(0,8).map(r => {
              const winner = getRoundWinner(r, players);
              return (
                <div key={r.id} style={{
                  flexShrink:0, width:56, padding:'8px 4px', textAlign:'center',
                  background:T.surface, borderRadius:8, border:`0.5px solid ${T.border}`,
                }}>
                  <div style={{fontSize:10, color:T.muted, marginBottom:4}}>R{r.id}</div>
                  <MultiBadge mult={r.multiplier}/>
                  <div style={{fontSize:11, fontWeight:600, marginTop:4, color:winner?.color}}>{winner?.name}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* CTA */}
      <div style={{position:'fixed', bottom:68, left:'50%', transform:'translateX(-50%)', width:'calc(100% - 32px)', maxWidth:398, zIndex:90}}>
        <div style={{background:`linear-gradient(to top, ${T.bg} 70%, transparent)`, paddingTop:16}}>
          <Btn onClick={onNewRound} style={{width:'100%', height:52, fontSize:16}}>
            Lancia Dadi  →  Round {rounds.length + 1}
          </Btn>
        </div>
      </div>
    </div>
  );
};

// ─── Screen: New Round Sheet ──────────────────────────────────
const NewRoundSheet = ({ players, roundNum, stake, onConfirm, onClose, editRound=null }) => {
  const [diceValues, setDiceValues] = useState(() => {
    if (editRound) return Object.fromEntries(editRound.results.map(r=>[r.pid, r.dice]));
    return Object.fromEntries(players.map(p=>[p.id,0]));
  });
  const [multiplier, setMultiplier] = useState(editRound?.multiplier ?? 1);
  const [step, setStep] = useState(editRound ? 'dice' : 'multiplier');
  const [triple4, setTriple4] = useState(false);
  const [animKey, setAnimKey] = useState(0);
  // tiebreaker state
  const [tbPlayers, setTbPlayers] = useState([]); // players still in tiebreaker
  const [tbValues, setTbValues] = useState({});
  const [tbAnimKey, setTbAnimKey] = useState(0);
  const [tbRound, setTbRound] = useState(1);
  // final results accumulator (main results, updated as tiebreaker resolves)
  const [mainResults, setMainResults] = useState([]);

  const setDie = (pid, val) => setDiceValues(prev => ({...prev, [pid]:val}));

  const handleRoll = () => {
    const random = Object.fromEntries(players.map(p=>[p.id, Math.random()<0.06 ? 18 : Math.floor(Math.random()*16)]));
    setDiceValues(random);
    setAnimKey(k=>k+1);
  };

  const handleTbRoll = () => {
    const random = Object.fromEntries(tbPlayers.map(p=>[p.id, Math.random()<0.06 ? 18 : Math.floor(Math.random()*16)]));
    setTbValues(random);
    setTbAnimKey(k=>k+1);
  };

  // Check if lowest-score players are tied (= tied winners); returns tied entries or null
  const getTiedWinners = (results) => {
    const minScore = Math.min(...results.map(r=>r.score));
    const tied = results.filter(r=>r.score===minScore);
    return tied.length > 1 ? tied : null;
  };

  const handleNext = () => {
    if (step === 'multiplier') {
      setStep('dice');
    } else if (step === 'dice') {
      const results = players.map(p=>({pid:p.id, dice:diceValues[p.id], score:diceValues[p.id]===18 ? -1 : diceValues[p.id]}));
      // Check triple-4 (3+ players with dice===4)
      const fours = results.filter(r=>r.dice===4);
      if (fours.length >= 3) {
        setTriple4(true);
        setTimeout(()=>{ setTriple4(false); }, 3000);
      }
      const tied = getTiedWinners(results);
      if (tied) {
        setMainResults(results);
        setTbPlayers(tied.map(r => players.find(p=>p.id===r.pid)));
        setTbValues(Object.fromEntries(tied.map(r=>[r.pid,0])));
        setTbRound(1);
        setStep('tiebreaker');
      } else {
        onConfirm({ multiplier, results, stake });
      }
    } else if (step === 'tiebreaker') {
      const tbResults = tbPlayers.map(p=>({pid:p.id, dice:tbValues[p.id], score:tbValues[p.id]===18 ? -1 : tbValues[p.id]}));
      const stillTied = getTiedWinners(tbResults);
      if (stillTied) {
        // another tiebreaker round
        setTbPlayers(stillTied.map(r => tbPlayers.find(p=>p.id===r.pid)));
        setTbValues(Object.fromEntries(stillTied.map(r=>[r.pid,0])));
        setTbAnimKey(0);
        setTbRound(n=>n+1);
      } else {
        // resolved — merge tiebreaker scores into main results for losers
        // lowest tiebreaker score = winner
        const minTb = Math.min(...tbResults.map(r=>r.score));
        const winnerPid = tbResults.find(r=>r.score===minTb).pid;
        const finalResults = mainResults.map(r =>
          tbResults.find(t=>t.pid===r.pid)
            ? {...r, tiebreaker: tbResults.find(t=>t.pid===r.pid).score, tiebreakerWinner: r.pid===winnerPid}
            : r
        );
        onConfirm({ multiplier, results: finalResults, stake, hadTiebreaker: true });
      }
    }
  };

  return (
    <>
      <div onClick={onClose} style={{
        position:'fixed', inset:0, background:'rgba(0,0,0,0.7)',
        zIndex:200, animation:'overlay-in 0.2s ease',
      }}/>
      <div style={{
        position:'fixed', bottom:0, left:'50%', transform:'translateX(-50%)',
        width:'100%', maxWidth:430,
        background:T.bg, borderRadius:'20px 20px 0 0',
        border:`0.5px solid ${T.border}`, borderBottom:'none',
        zIndex:201, animation:'sheet-up 0.3s cubic-bezier(0.22,1,0.36,1)',
        paddingBottom:'env(safe-area-inset-bottom, 24px)',
      }}>
        {/* Handle */}
        <div style={{display:'flex', justifyContent:'center', paddingTop:12, paddingBottom:4}}>
          <div style={{width:36, height:4, borderRadius:2, background:T.border}}/>
        </div>
        <div style={{padding:'12px 20px 24px'}}>
          {/* Header */}
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20}}>
            <div>
              <div style={{fontSize:20, fontWeight:700}}>
                {editRound ? `Modifica Round ${editRound.id}` : step === 'tiebreaker' ? `Spareggio — manche ${tbRound}` : `Round ${roundNum}`}
              </div>
              <Label>
                {step === 'tiebreaker' ? `Pareggio — chi vince lo spareggio? ${tbPlayers.map(p=>p.name).join(' vs ')}`
                  : step === 'multiplier' ? 'Scegli moltiplicatore'
                  : (editRound ? 'Correggi i dadi' : 'Inserisci i risultati')}
              </Label>
            </div>
            <button onClick={onClose} style={{background:T.surf2, border:`0.5px solid ${T.border}`, borderRadius:8, width:36, height:36, color:T.muted, cursor:'pointer', fontSize:18}}>×</button>
          </div>

          {step === 'dice' && (
            <>
              {/* Auto-roll */}
              <Btn variant="secondary" onClick={handleRoll} style={{width:'100%', marginBottom:16}}>
                Lancia random
              </Btn>

              {/* Per-player dice */}
              <div style={{display:'flex', flexDirection:'column', gap:12}}>
                {players.map(p => (
                  <div key={p.id} style={{
                    display:'flex', alignItems:'center', justifyContent:'space-between',
                    background:T.surface, borderRadius:12, padding:'12px 16px',
                    border:`0.5px solid ${T.border}`,
                  }}>
                    <div style={{display:'flex', alignItems:'center', gap:10}}>
                      <div style={{width:3, height:36, borderRadius:2, background:p.color, flexShrink:0}}/>
                      <span style={{fontSize:16, fontWeight:600}}>{p.name}</span>
                    </div>
                    <div style={{display:'flex', alignItems:'center', gap:10}}>
                      <DieFace key={`${animKey}-${p.id}`} value={diceValues[p.id]} size={34} animated={animKey>0}/>
                      <Stepper value={diceValues[p.id]} onChange={v=>setDie(p.id,v)} min={0} max={18}/>
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}

          {step === 'multiplier' && (
            <div style={{display:'flex', flexDirection:'column', gap:12}}>
              {[1,2,3,5,10].map(m => {
                const colors = {1:T.muted, 2:T.blue, 3:T.amber, 5:T.gold, 10:T.red};
                const labels = {1:'Normale',2:'Doppio',3:'Triplo',5:'Cinquina',10:'All-in'};
                const bgs = {1:'rgba(255,255,255,0.06)',2:'rgba(96,165,250,0.12)',3:`rgba(251,185,36,0.12)`,5:T.goldDim,10:T.redDim};
                const col = colors[m];
                return (
                  <button key={m} onClick={() => setMultiplier(m)} style={{
                    display:'flex', alignItems:'center', justifyContent:'space-between',
                    padding:'16px 20px', borderRadius:12,
                    background: multiplier===m ? bgs[m] : T.surface,
                    border: `1.5px solid ${multiplier===m ? col : T.border}`,
                    cursor:'pointer', color:T.text, width:'100%',
                    WebkitTapHighlightColor:'transparent',
                    transition:'border-color 0.15s, background 0.15s',
                  }}>
                    <div style={{textAlign:'left'}}>
                      <div style={{fontSize:16, fontWeight:600}}>{labels[m]}</div>
                      <div style={{fontSize:12, color:T.muted, marginTop:2}}>
                        ×{m} — €{(stake*players.length*m).toFixed(2)} in gioco
                      </div>
                    </div>
                    <span style={{
                      display:'inline-flex', alignItems:'center', gap:5,
                      padding:'3px 12px', borderRadius:99,
                      background: multiplier===m ? bgs[m] : 'rgba(255,255,255,0.06)',
                      color: multiplier===m ? col : T.muted,
                      fontSize:13, fontWeight:700,
                      border:`1px solid ${multiplier===m ? col+'55' : 'transparent'}`,
                    }}>×{m}</span>
                  </button>
                );
              })}
            </div>
          )}

          {step === 'tiebreaker' && (
            <>
              {/* Context: show main scores */}
              <div style={{display:'flex', gap:6, marginBottom:16, padding:'10px 12px', background:T.surf2, borderRadius:10, border:`0.5px solid ${T.border}`}}>
                {mainResults.map(r => {
                  const p = players.find(p=>p.id===r.pid);
                  const isTied = tbPlayers.find(tp=>tp.id===r.pid);
                  return (
                    <div key={r.pid} style={{flex:1, textAlign:'center', opacity: isTied?1:0.35}}>
                      <div style={{fontSize:10, color:T.muted, marginBottom:3}}>{p?.name}</div>
                      <div style={{fontSize:18, fontWeight:700, color: isTied?T.amber:T.muted, fontVariantNumeric:'tabular-nums'}}>{r.score}</div>
                    </div>
                  );
                })}
              </div>
              {/* Tiebreaker dice inputs */}
              <Btn variant="secondary" onClick={handleTbRoll} style={{width:'100%', marginBottom:12}}>
                Lancia random
              </Btn>
              <div style={{display:'flex', flexDirection:'column', gap:10}}>
                {tbPlayers.map(p => (
                  <div key={p.id} style={{
                    display:'flex', alignItems:'center', justifyContent:'space-between',
                    background:T.surface, borderRadius:12, padding:'12px 16px',
                    border:`1px solid ${T.amber}44`,
                  }}>
                    <div style={{display:'flex', alignItems:'center', gap:10}}>
                      <div style={{width:3, height:36, borderRadius:2, background:p.color, flexShrink:0}}/>
                      <span style={{fontSize:16, fontWeight:600}}>{p.name}</span>
                    </div>
                    <div style={{display:'flex', alignItems:'center', gap:10}}>
                      <DieFace key={`tb-${tbAnimKey}-${p.id}`} value={tbValues[p.id]??0} size={34} animated={tbAnimKey>0}/>
                      <Stepper value={tbValues[p.id]??0}
                        onChange={v=>setTbValues(prev=>({...prev,[p.id]:v}))} min={0} max={18}/>
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}

          <Btn onClick={handleNext} style={{width:'100%', marginTop:20, height:52, fontSize:16}}>
            {step === 'multiplier' ? 'Avanti →'
              : step === 'dice' ? (editRound ? 'Salva modifiche' : 'Conferma round')
              : 'Risolvi spareggio →'}
          </Btn>

          {/* Triple-4 overlay */}
          {triple4 && (
            <div style={{
              position:'fixed', inset:0, zIndex:500,
              background:'rgba(0,0,0,0.92)',
              display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
              gap:24, animation:'overlay-in 0.3s ease',
            }}>
              <div style={{fontSize:11, fontWeight:600, letterSpacing:'0.12em', textTransform:'uppercase', color:T.gold}}>Tre Quattro!</div>
              <div style={{display:'flex', gap:16}}>

                      <rect x="5" y="5" width="90" height="90" rx="18" fill={T.goldDim} stroke={T.gold} strokeWidth="2.5"/>

                ))}

            </div>
          )}
        </div>
      </div>
    </>
  );
};

// ─── Screen: Stats ────────────────────────────────────────────
const StatsScreen = ({ players, rounds, onEditRound }) => {
  const totalRounds = rounds.length;
  const totalPot = rounds.reduce((s,r) => s + r.stake * players.length * r.multiplier, 0);
  const [tab, setTab] = useState('summary'); // 'summary' | 'table'

  // Build per-round running balances
  const runningBalances = (() => {
    const bal = Object.fromEntries(players.map(p=>[p.id, 0]));
    return rounds.map(r => {
      const minScore = Math.min(...r.results.map(x=>x.score));
      const winners = r.results.some(x=>x.tiebreakerWinner)
        ? r.results.filter(x=>x.tiebreakerWinner)
        : r.results.filter(x=>x.score===minScore);
      const losers = r.results.filter(x=>!winners.find(w=>w.pid===x.pid));
      const payout = r.stake * losers.length / winners.length * r.multiplier;
      const debit  = r.stake * r.multiplier;
      winners.forEach(w => { if(bal[w.pid]!==undefined) bal[w.pid] = +(bal[w.pid]+payout).toFixed(2); });
      losers.forEach(l  => { if(bal[l.pid]!==undefined) bal[l.pid] = +(bal[l.pid]-debit).toFixed(2); });
      return { roundId: r.id, multiplier: r.multiplier, results: r.results, balances: {...bal} };
    });
  })();

  // Per-player averages (dice value, excluding -1 special)
  const playerAvg = players.map(p => {
    const vals = rounds.map(r => r.results.find(x=>x.pid===p.id)?.dice ?? null).filter(v=>v!==null);
    const avg = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length) : 0;
    return { ...p, avg: avg.toFixed(1) };
  });

  return (
    <div style={{paddingBottom:100, animation:'slide-up 0.3s ease'}}>
      <div style={{padding:'0 16px'}}>
        <div style={{paddingTop:56, paddingBottom:16}}>
          <Label>Statistiche</Label>
          <div style={{fontSize:24, fontWeight:700, marginTop:2}}>Sessione</div>
        </div>

        {/* Tab switcher */}
        <div style={{display:'flex', gap:4, marginBottom:16, background:T.surf2, borderRadius:10, padding:4, border:`0.5px solid ${T.border}`}}>
          {[{id:'summary',label:'Riepilogo'},{id:'table',label:'Tabella turni'}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              flex:1, height:34, borderRadius:7, border:'none', cursor:'pointer',
              background: tab===t.id ? T.surface : 'transparent',
              color: tab===t.id ? T.text : T.muted,
              fontSize:13, fontWeight: tab===t.id ? 600 : 400,
              WebkitTapHighlightColor:'transparent',
              boxShadow: tab===t.id ? `0 0 0 0.5px ${T.border}` : 'none',
              transition:'background 0.15s',
            }}>{t.label}</button>
          ))}
        </div>
      </div>

      {tab === 'summary' && (
        <div style={{padding:'0 16px'}}>
          {/* Totals */}
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:20}}>
            {[
              { label:'Round giocati', value: totalRounds, color: T.blue },
              { label:'Montepremi tot.', value: '€'+totalPot.toFixed(2), color: T.gold },
              { label:'Multiplic. ×2', value: rounds.filter(r=>r.multiplier===2).length, color: T.amber },
              { label:'Multiplic. ×3', value: rounds.filter(r=>r.multiplier===3).length, color: T.red },
            ].map(item => (
              <Card key={item.label} style={{padding:'14px 16px'}}>
                <Label>{item.label}</Label>
                <div style={{fontSize:26, fontWeight:700, color:item.color, marginTop:4, fontVariantNumeric:'tabular-nums'}}>
                  {item.value}
                </div>
              </Card>
            ))}
          </div>

          {/* Player cards */}
          <Label style={{marginBottom:8, display:'block'}}>Bilancio giocatori</Label>
          <div style={{display:'flex', flexDirection:'column', gap:8}}>
            {[...players].sort((a,b)=>b.balance-a.balance).map((p) => {
              const maxAbs = Math.max(...players.map(p=>Math.abs(p.balance)), 0.01);
              const barW = Math.abs(p.balance)/maxAbs;
              const avg = playerAvg.find(x=>x.id===p.id)?.avg ?? '0.0';
              return (
                <Card key={p.id} style={{padding:'14px 16px'}}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
                    <div style={{display:'flex', alignItems:'center', gap:8}}>
                      <div style={{width:3, height:20, borderRadius:2, background:p.color}}/>
                      <span style={{fontSize:16, fontWeight:600}}>{p.name}</span>
                    </div>
                    <span style={{fontSize:22, fontWeight:700, fontVariantNumeric:'tabular-nums', color: p.balance>=0?T.green:T.red}}>
                      {p.balance>=0?'+':''}{p.balance.toFixed(2)}
                    </span>
                  </div>
                  <div style={{height:4, background:T.surf2, borderRadius:2, overflow:'hidden', marginBottom:8}}>
                    <div style={{height:'100%', width:`${barW*100}%`, background: p.balance>=0?T.green:T.red, borderRadius:2}}/>
                  </div>
                  <div style={{display:'flex', gap:12}}>
                    <span style={{fontSize:11, color:T.muted}}>{p.wins}V / {p.losses}P</span>
                    <span style={{fontSize:11, color:T.muted}}>
                      {p.wins+p.losses>0?Math.round(p.wins/(p.wins+p.losses)*100):0}% win rate
                    </span>
                    <span style={{fontSize:11, color:T.muted}}>media: {avg}</span>
                  </div>
                </Card>
              );
            })}
          </div>
        </div>
      )}

      {tab === 'table' && (
        <div style={{overflowX:'auto', paddingBottom:8}}>
          <table style={{
            borderCollapse:'collapse', fontSize:12,
            minWidth: 100 + players.length * 52 + 80 + players.length * 60,
            margin:'0 16px',
          }}>
            <thead>
              <tr>
                {/* Fixed left cols */}
                <th style={thStyle('#')}>T</th>
                {players.map(p=>(
                  <th key={p.id} style={{...thStyle(p.name), color:p.color}}>{p.name}</th>
                ))}
                <th style={thStyle('Min')}>Min</th>
                <th style={thStyle('×')}>×</th>
                {/* Running balance per player */}
                {players.map(p=>(
                  <th key={`b${p.id}`} style={{...thStyle(`€ ${p.name}`), color:p.color}}>€ {p.name}</th>
                ))}
                <th style={thStyle('edit')}></th>
              </tr>
            </thead>
            <tbody>
              {runningBalances.map((row, i) => {
                const minScore = Math.min(...row.results.map(r=>r.score));
                const winnerResult = row.results.some(x=>x.tiebreakerWinner)
                  ? row.results.find(x=>x.tiebreakerWinner)
                  : row.results.find(r=>r.score===minScore);
                const isEven = i % 2 === 0;
                const srcRound = rounds.find(r=>r.id===row.roundId);
                return (
                  <tr key={row.roundId} style={{background: isEven ? T.surface : 'transparent'}}>
                    <td style={tdStyle}>{row.roundId}</td>
                    {players.map(p => {
                      const res = row.results.find(r=>r.pid===p.id);
                      const isWinner = winnerResult?.pid === p.id;
                      const diceVal = res?.dice ?? '–';
                      const isSpecial = diceVal === 18;
                      return (
                        <td key={p.id} style={{
                          ...tdStyle, fontWeight: isWinner ? 700 : 400,
                          color: isSpecial ? T.gold : isWinner ? T.green : T.text,
                          background: isWinner ? 'rgba(74,222,128,0.06)' : undefined,
                        }}>
                          {isSpecial ? '−1★' : diceVal}
                        </td>
                      );
                    })}
                    {/* Min score */}
                    <td style={{...tdStyle, color:T.green, fontWeight:700}}>
                      {minScore === -1 ? '−1★' : minScore}
                    </td>
                    {/* Multiplier */}
                    <td style={{...tdStyle, color: row.multiplier===3?T.red:row.multiplier===2?T.gold:T.muted}}>
                      ×{row.multiplier}
                    </td>
                    {/* Running balances */}
                    {players.map(p => {
                      const bal = row.balances[p.id] ?? 0;
                      return (
                        <td key={`b${p.id}`} style={{
                          ...tdStyle, fontWeight:600, fontVariantNumeric:'tabular-nums',
                          color: bal > 0 ? T.green : bal < 0 ? T.red : T.muted,
                        }}>
                          {bal >= 0 ? '+' : ''}{bal.toFixed(2)}
                        </td>
                      );
                    })}
                    <td style={tdStyle}>
                      <button onClick={()=>onEditRound(srcRound)} style={{
                        padding:'5px 10px', borderRadius:6, fontSize:12, fontWeight:600,
                        background:'rgba(255,255,255,0.08)', border:`0.5px solid ${T.border}`,
                        color:T.text, cursor:'pointer', whiteSpace:'nowrap',
                        WebkitTapHighlightColor:'transparent',
                      }}>✎ Mod.</button>
                    </td>
                  </tr>
                );
              })}

              {/* Average row */}
              {rounds.length > 0 && (
                <tr style={{borderTop:`1px solid ${T.border}`, background: T.surf2}}>
                  <td style={{...tdStyle, color:T.muted, fontStyle:'italic'}}>avg</td>
                  {playerAvg.map(p => (
                    <td key={p.id} style={{...tdStyle, color:T.amber, fontWeight:600}}>{p.avg}</td>
                  ))}
                  <td style={tdStyle}/>
                  <td style={tdStyle}/>
                  {/* Final balances */}
                  {players.map(p => {
                    const finalBal = p.balance;
                    return (
                      <td key={`bf${p.id}`} style={{
                        ...tdStyle, fontWeight:700, fontVariantNumeric:'tabular-nums',
                        color: finalBal>=0?T.green:T.red,
                      }}>
                        {finalBal>=0?'+':''}{finalBal.toFixed(2)}
                      </td>
                    );
                  })}
                </tr>
              )}
            </tbody>
          </table>

          {rounds.length === 0 && (
            <div style={{padding:'32px 16px', textAlign:'center', color:T.muted}}>
              Nessun round ancora giocato
            </div>
          )}
        </div>
      )}
    </div>
  );
};

// ─── Screen: Profile ──────────────────────────────────────────
const ProfileScreen = ({ players }) => {
  const [selected, setSelected] = useState(players[0]?.id);
  const player = players.find(p=>p.id===selected) || players[0];
  if (!player) return null;

  const totalGames = player.wins + player.losses;
  const winRate = totalGames > 0 ? player.wins/totalGames : 0;
  const bestStreak = 3; // mock

  return (
    <div style={{padding:'0 16px', paddingBottom:100, animation:'slide-up 0.3s ease'}}>
      <div style={{paddingTop:56, paddingBottom:16}}>
        <Label>Profilo</Label>
      </div>

      {/* Player selector */}
      <div style={{display:'flex', gap:8, overflowX:'auto', paddingBottom:8, marginBottom:16}}>
        {players.map(p => (
          <button key={p.id} onClick={() => setSelected(p.id)} style={{
            flexShrink:0, padding:'8px 14px', borderRadius:99,
            background: selected===p.id ? p.color+'22' : T.surface,
            border: `1.5px solid ${selected===p.id ? p.color : T.border}`,
            color: selected===p.id ? p.color : T.muted,
            fontSize:14, fontWeight:600, cursor:'pointer',
            WebkitTapHighlightColor:'transparent',
          }}>{p.name}</button>
        ))}
      </div>

      {/* Hero card */}
      <Card style={{
        padding:'24px 20px', marginBottom:12,
        border:`0.5px solid ${player.color}33`,
        background: player.balance>=0 ? 'rgba(74,222,128,0.03)' : 'rgba(196,30,58,0.03)',
      }}>
        <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:20}}>
          <div style={{
            width:52, height:52, borderRadius:99,
            background: player.color+'22', border:`1.5px solid ${player.color}`,
            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:22, fontWeight:700, color:player.color,
          }}>
            {player.name[0]}
          </div>
          <div>
            <div style={{fontSize:20, fontWeight:700}}>{player.name}</div>
            <Label>{player.wins+player.losses} round totali</Label>
          </div>
          <div style={{marginLeft:'auto', textAlign:'right'}}>
            <Label>Bilancio</Label>
            <div style={{
              fontSize:28, fontWeight:700, fontVariantNumeric:'tabular-nums',
              color: player.balance >= 0 ? T.green : T.red,
              marginTop:2,
            }}>
              {player.balance>=0?'+':''}{player.balance.toFixed(2)}
            </div>
          </div>
        </div>

        {/* Win rate arc */}
        <div style={{display:'flex', alignItems:'center', gap:16}}>
          <svg width="72" height="72" viewBox="0 0 72 72">
            <circle cx="36" cy="36" r="28" fill="none" stroke={T.surf2} strokeWidth="6"/>
            <circle cx="36" cy="36" r="28" fill="none" stroke={player.color} strokeWidth="6"
              strokeDasharray={`${winRate * 175.9} 175.9`}
              strokeLinecap="round" transform="rotate(-90 36 36)"/>
            <text x="36" y="41" textAnchor="middle" fontSize="14" fontWeight="700" fill={T.text}>
              {Math.round(winRate*100)}%
            </text>
          </svg>
          <div style={{flex:1, display:'flex', flexDirection:'column', gap:10}}>
            <div style={{display:'flex', justifyContent:'space-between'}}>
              <Label>Vittorie</Label>
              <span style={{fontSize:14, fontWeight:700, color:T.green}}>{player.wins}</span>
            </div>
            <div style={{display:'flex', justifyContent:'space-between'}}>
              <Label>Sconfitte</Label>
              <span style={{fontSize:14, fontWeight:700, color:T.red}}>{player.losses}</span>
            </div>
            <div style={{display:'flex', justifyContent:'space-between'}}>
              <Label>Serie migliore</Label>
              <span style={{fontSize:14, fontWeight:700, color:T.amber}}>{bestStreak}</span>
            </div>
          </div>
        </div>
      </Card>

      {/* Dice distribution */}
      <Label style={{display:'block', marginBottom:8}}>Distribuzione dadi</Label>
      <Card>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-end', gap:4}}>
          {[1,2,3,4,5,6].map(face => {
            const count = Math.floor(Math.random()*6)+1; // mock
            const max = 8;
            return (
              <div key={face} style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:6}}>
                <span style={{fontSize:10, color:T.muted}}>{count}</span>
                <div style={{
                  width:'100%', height:Math.round(count/max*60),
                  background: face===6?T.gold:T.surf2,
                  borderRadius:'3px 3px 0 0', minHeight:4,
                }}/>
                <DieFace value={face} size={24}/>
              </div>
            );
          })}
        </div>
      </Card>
    </div>
  );
};

// ─── Screen: Settings ─────────────────────────────────────────
const SettingsScreen = ({ players, stake, onStakeChange, onAddPlayer, onRemovePlayer, onReset }) => {
  const [newName, setNewName] = useState('');

  return (
    <div style={{padding:'0 16px', paddingBottom:100, animation:'slide-up 0.3s ease'}}>
      <div style={{paddingTop:56, paddingBottom:20}}>
        <Label>Configurazione</Label>
        <div style={{fontSize:24, fontWeight:700, marginTop:2}}>Partita</div>
      </div>

      {/* Stake */}
      <Label style={{display:'block', marginBottom:8}}>Posta per round</Label>
      <Card style={{marginBottom:20}}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
          <span style={{fontSize:15}}>€ per giocatore</span>
          <div style={{display:'flex', alignItems:'center', gap:0, background:T.surf2, borderRadius:8, overflow:'hidden', border:`0.5px solid ${T.border}`}}>
            {[0.50, 1, 2, 5].map(v => (
              <button key={v} onClick={() => onStakeChange(v)} style={{
                width:52, height:40, background: stake===v?T.goldDim:'transparent',
                border:'none', borderRight:`0.5px solid ${T.border}`,
                color: stake===v?T.gold:T.muted, fontSize:13, fontWeight:stake===v?700:400,
                cursor:'pointer', WebkitTapHighlightColor:'transparent',
              }}>€{v}</button>
            ))}
          </div>
        </div>
      </Card>

      {/* Players */}
      <Label style={{display:'block', marginBottom:8}}>Giocatori ({players.length}/6)</Label>
      <div style={{display:'flex', flexDirection:'column', gap:6, marginBottom:12}}>
        {players.map((p, i) => (
          <div key={p.id} style={{
            display:'flex', alignItems:'center', gap:10,
            background:T.surface, borderRadius:10, padding:'10px 14px',
            border:`0.5px solid ${T.border}`,
          }}>
            <div style={{width:3, height:24, borderRadius:2, background:p.color}}/>
            <span style={{flex:1, fontSize:15, fontWeight:600}}>{p.name}</span>
            <span style={{fontSize:12, color: p.balance>=0?T.green:T.red, fontVariantNumeric:'tabular-nums'}}>
              {p.balance>=0?'+':''}{p.balance.toFixed(2)}
            </span>
            {players.length > 2 && (
              <button onClick={() => onRemovePlayer(p.id)} style={{
                width:32, height:32, borderRadius:6, background:T.redDim,
                border:`0.5px solid ${T.red}22`, color:T.red,
                cursor:'pointer', fontSize:16, display:'flex', alignItems:'center', justifyContent:'center',
              }}>×</button>
            )}
          </div>
        ))}
      </div>

      {players.length < 6 && (
        <div style={{display:'flex', gap:8, marginBottom:20}}>
          <input
            value={newName}
            onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&newName.trim()){onAddPlayer(newName.trim());setNewName('');}}}
            placeholder="Nome giocatore..."
            style={{
              flex:1, height:44, background:T.surf2, border:`0.5px solid ${T.border}`,
              borderRadius:8, padding:'0 14px', color:T.text, fontSize:15,
              outline:'none', fontFamily:'var(--font)',
            }}
          />
          <Btn onClick={() => { if(newName.trim()){onAddPlayer(newName.trim());setNewName('');} }}
            disabled={!newName.trim()}>
            +
          </Btn>
        </div>
      )}

      {/* Danger zone */}
      <div style={{marginTop:8, paddingTop:20, borderTop:`0.5px solid ${T.border}`}}>
        <Label style={{display:'block', marginBottom:12}}>Vuoi ricominciare la partita?</Label>
        <Btn variant="danger" onClick={onReset} style={{width:'100%'}}>
          Resetta sessione
        </Btn>
      </div>
    </div>
  );
};

// ─── Result Flash ─────────────────────────────────────────────
const ResultFlash = ({ round, players, stake, onDismiss }) => {
  const winner = getRoundWinner(round, players);
  const sorted = [...round.results].sort((a,b)=>a.score-b.score);
  const pot = stake * players.length * round.multiplier;

  useEffect(() => {
    const t = setTimeout(onDismiss, 3500);
    return () => clearTimeout(t);
  }, []);

  return (
    <>
      <div onClick={onDismiss} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:300,animation:'overlay-in 0.3s ease'}}/>
      <div style={{
        position:'fixed', top:'50%', left:'50%', transform:'translate(-50%,-50%)',
        zIndex:301, width:'calc(100% - 48px)', maxWidth:382,
        background:T.surface, borderRadius:20,
        border:`0.5px solid ${winner?.color}44`,
        padding:'28px 24px', textAlign:'center',
        animation:'slide-up 0.4s cubic-bezier(0.22,1,0.36,1)',
      }}>
        <div style={{fontSize:11, fontWeight:500, letterSpacing:'0.08em', textTransform:'uppercase', color:T.muted, marginBottom:12}}>Round vinto</div>
        <div style={{
          width:72, height:72, borderRadius:99, background:winner?.color+'22',
          border:`2px solid ${winner?.color}`, display:'flex', alignItems:'center', justifyContent:'center',
          fontSize:28, fontWeight:700, color:winner?.color, margin:'0 auto 12px',
        }}>{winner?.name[0]}</div>
        <div style={{fontSize:28, fontWeight:700, marginBottom:4}}>{winner?.name}</div>
        <div style={{fontSize:32, fontWeight:700, color:T.gold, marginBottom:16, fontVariantNumeric:'tabular-nums'}}>
          +€{pot.toFixed(2)}
        </div>
        <MultiBadge mult={round.multiplier}/>
        <div style={{display:'flex', justifyContent:'center', gap:16, marginTop:16}}>
          {sorted.map(r => {
            const p = players.find(p=>p.id===r.pid);
            return (
              <div key={r.pid} style={{textAlign:'center', opacity: r.pid===winner?.id?1:0.5}}>
                <DieFace value={r.dice} size={32} animated/>
                <div style={{fontSize:11, color:T.muted, marginTop:4}}>{p?.name}</div>
              </div>
            );
          })}
        </div>
      </div>
    </>
  );
};

// ─── Root App ─────────────────────────────────────────────────
const App = () => {
  const [screen, setScreen] = useState('game');
  const [basePlayers, setBasePlayers] = useState(() => {
    try { return JSON.parse(localStorage.getItem('dadi_baseplayers')) || INIT_PLAYERS; } catch { return INIT_PLAYERS; }
  });
  const [rounds, setRounds] = useState(() => {
    try { return JSON.parse(localStorage.getItem('dadi_rounds')) || INIT_ROUNDS; } catch { return INIT_ROUNDS; }
  });
  const players = deriveStats(basePlayers, rounds);
  const [stake, setStake] = useState(() => parseFloat(localStorage.getItem('dadi_stake')) || 2);
  const [showNewRound, setShowNewRound] = useState(false);
  const [editRound, setEditRound] = useState(null);
  const [flashRound, setFlashRound] = useState(null);
  const [tweaks, setTweaks] = useState({ accentColor: 'gold', density: 'normal', animations: true });
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => {
    localStorage.setItem('dadi_baseplayers', JSON.stringify(basePlayers));
    localStorage.setItem('dadi_rounds', JSON.stringify(rounds));
    localStorage.setItem('dadi_stake', stake);
  }, [basePlayers, rounds, stake]);

  const handleNewRound = ({ multiplier, results, stake: s }) => {
    const round = { id: rounds.length+1, multiplier, results, stake: s };
    setRounds(prev => [...prev, round]);
    setShowNewRound(false);
    setFlashRound(round);
    setScreen('game');
  };

  const handleEditRoundConfirm = ({ multiplier, results, stake: s }) => {
    setRounds(prev => prev.map(r =>
      r.id === editRound.id ? { ...r, multiplier, results, stake: s } : r
    ));
    setEditRound(null);
  };

  const handleAddPlayer = name => {
    if (basePlayers.length >= 6) return;
    const id = Math.max(...basePlayers.map(p=>p.id), 0) + 1;
    setBasePlayers(prev => [...prev, {
      id, name, color: PLAYER_COLORS[prev.length % PLAYER_COLORS.length],
    }]);
  };

  const handleRemovePlayer = id => {
    setBasePlayers(prev => prev.filter(p=>p.id!==id));
    setRounds(prev => prev.map(r => ({...r, results: r.results.filter(res=>res.pid!==id)})));
  };

  const handleReset = () => {
    if (rounds.length === 0) { alert('Nessuna partita da salvare.'); return; }
    if (!confirm('Vuoi ricominciare la partita? Verrà scaricato un CSV con i dati della sessione.')) return;

    const derived = deriveStats(basePlayers, rounds);
    const date = new Date().toLocaleDateString('it-IT');
    const totalRounds = rounds.length;

    // Verifica somma zero
    const totalBalance = derived.reduce((s, p) => s + p.balance, 0);
    const isZero = Math.abs(totalBalance) < 0.01;
    const checkLabel = isZero ? 'OK (somma = 0)' : `ATTENZIONE: somma = ${totalBalance.toFixed(2)}`;

    // Intestazione partita
    const headerRows = [
      ['=== DADI — Riepilogo Sessione ==='],
      ['Data', date],
      ['Round totali', totalRounds],
      ['Verifica saldo (somma zero)', checkLabel],
      [],
      ['--- Riepilogo giocatori ---'],
      ['Giocatore','Vittorie','Sconfitte','Win Rate %','Bilancio €'],
      ...derived.map(p => [
        p.name, p.wins, p.losses,
        p.wins+p.losses>0 ? Math.round(p.wins/(p.wins+p.losses)*100) : 0,
        p.balance.toFixed(2),
      ]),
      ['TOTALE','','','', totalBalance.toFixed(2) + (isZero?' ✓':' ✗')],
      [],
      ['--- Dettaglio turni ---'],
      ['Turno','Moltiplicatore', ...derived.map(p=>p.name), 'Vincitore','Pot €'],
    ];

    // Righe per ogni round
    const roundRows = rounds.map(r => {
      const minScore = Math.min(...r.results.map(x=>x.score));
      const winRes = r.results.some(x=>x.tiebreakerWinner)
        ? r.results.find(x=>x.tiebreakerWinner)
        : r.results.find(x=>x.score===minScore);
      const winner = derived.find(p=>p.id===winRes?.pid);
      const pot = (r.stake * derived.length * r.multiplier).toFixed(2);
      const diceByPlayer = derived.map(p => {
        const res = r.results.find(x=>x.pid===p.id);
        return res ? (res.dice===18 ? '-1(18)' : res.dice) : '-';
      });
      return [r.id, `x${r.multiplier}`, ...diceByPlayer, winner?.name ?? '?', pot];
    });

    const allRows = [...headerRows, ...roundRows];
    const csv = allRows.map(r => Array.isArray(r) ? r.join(',') : r).join('\n');
    const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `dadi_${date.replace(/\//g,'-')}.csv`;
    a.click();
    URL.revokeObjectURL(url);

    // Build email body text
    const emailBody = [
      `DADI — Riepilogo Sessione`,
      `Data: ${date} | Round totali: ${totalRounds}`,
      `Verifica saldo: ${checkLabel}`,
      ``,
      `--- BILANCIO GIOCATORI ---`,
      ...derived.map(p =>
        `${p.name}: ${p.balance>=0?'+':''}${p.balance.toFixed(2)}€  |  ${p.wins}V ${p.losses}P  |  ${p.wins+p.losses>0?Math.round(p.wins/(p.wins+p.losses)*100):0}% win rate`
      ),
      `TOTALE: ${totalBalance.toFixed(2)}€ ${isZero?'✓ (zero)':'✗ (errore)'}`,
      ``,
      `--- DETTAGLIO TURNI ---`,
      rounds.map(r => {
        const minScore = Math.min(...r.results.map(x=>x.score));
        const winRes = r.results.some(x=>x.tiebreakerWinner)
          ? r.results.find(x=>x.tiebreakerWinner)
          : r.results.find(x=>x.score===minScore);
        const winner = derived.find(p=>p.id===winRes?.pid);
        const diceStr = derived.map(p=>{
          const res = r.results.find(x=>x.pid===p.id);
          return `${p.name}:${res?(res.dice===18?'-1★':res.dice):'-'}`;
        }).join(' ');
        return `R${r.id} ×${r.multiplier}  ${diceStr}  → ${winner?.name??'?'}`;
      }).join('\n'),
    ].join('\n');

    const mailTo = 'luca4sera4fonzies4@gmail.com';
    const subject = encodeURIComponent(`Dadi — Sessione ${date} (${totalRounds} round)`);
    const body = encodeURIComponent(emailBody);
    window.open(`mailto:${mailTo}?subject=${subject}&body=${body}`, '_blank');

    setBasePlayers(INIT_PLAYERS);
    setRounds([]);
  };

  // Tweaks panel
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  return (
    <div style={{position:'relative', minHeight:'100vh'}}>
      {/* Status bar mock */}
      <div style={{
        position:'fixed', top:0, left:'50%', transform:'translateX(-50%)',
        width:'100%', maxWidth:430, height:44,
        display:'flex', justifyContent:'space-between', alignItems:'center',
        padding:'0 20px', zIndex:50,
        background: T.bg,
      }}>
        <span style={{fontSize:12, fontWeight:600, fontVariantNumeric:'tabular-nums'}}>
          {new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}
        </span>
        <span style={{fontSize:13, fontWeight:700, letterSpacing:'0.05em', color:T.gold}}>DADI</span>
        <div style={{display:'flex', gap:4, alignItems:'center'}}>
          <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="4" width="3" height="8" rx="1" fill={T.muted}/><rect x="4" y="2" width="3" height="10" rx="1" fill={T.muted}/><rect x="8" y="0" width="3" height="12" rx="1" fill={T.text}/><rect x="12" y="0" width="3" height="12" rx="1" fill={T.text}/></svg>
          <svg width="14" height="12" viewBox="0 0 14 12"><path d="M7 2.5 C4 2.5 1.5 5 1.5 8 L3 8 C3 5.8 4.8 4 7 4 C9.2 4 11 5.8 11 8 L12.5 8 C12.5 5 10 2.5 7 2.5Z" fill={T.text}/><circle cx="7" cy="9.5" r="1.5" fill={T.text}/></svg>
          <div style={{
            width:22, height:11, borderRadius:3,
            border:`1px solid rgba(255,255,255,0.3)`, display:'flex', alignItems:'center', padding:'1px',
          }}>
            <div style={{width:'75%', height:'100%', background:T.green, borderRadius:2}}/>
          </div>
        </div>
      </div>

      {/* Main screen content */}
      <div style={{paddingTop:44}}>
        {screen==='game' && <GameScreen players={players} rounds={rounds} stake={stake} onNewRound={()=>setShowNewRound(true)} onEditRound={setEditRound}/>}
        {screen==='stats' && <StatsScreen players={players} rounds={rounds} onEditRound={setEditRound}/>}
        {screen==='profile' && <ProfileScreen players={players}/>}
        {screen==='settings' && <SettingsScreen players={players} stake={stake} onStakeChange={setStake} onAddPlayer={handleAddPlayer} onRemovePlayer={handleRemovePlayer} onReset={handleReset}/>}
      </div>

      <BottomNav active={screen} onChange={setScreen}/>

      {(showNewRound || editRound) && (
        <NewRoundSheet
          players={players}
          roundNum={rounds.length+1}
          stake={stake}
          onConfirm={editRound ? handleEditRoundConfirm : handleNewRound}
          onClose={()=>{ setShowNewRound(false); setEditRound(null); }}
          editRound={editRound}
        />
      )}

      {flashRound && (
        <ResultFlash
          round={flashRound}
          players={players}
          stake={stake}
          onDismiss={()=>setFlashRound(null)}
        />
      )}

      {/* Tweaks panel */}
      <div id="tweaks-panel" className={tweaksOpen?'visible':''}>
        <h3>Tweaks</h3>
        <div className="tweak-row">
          <label>Colore accento</label>
          <select value={tweaks.accentColor} onChange={e=>{
            const c = e.target.value;
            setTweaks(t=>({...t,accentColor:c}));
            document.documentElement.style.setProperty('--gold', {gold:'#D4AF37',blue:'#60A5FA',amber:'#FBB924',green:'#4ADE80'}[c]);
            window.parent.postMessage({type:'__edit_mode_set_keys',edits:{accentColor:c}},'*');
          }}>
            <option value="gold">Gold</option>
            <option value="blue">Blue</option>
            <option value="amber">Amber</option>
            <option value="green">Green</option>
          </select>
        </div>
        <div className="tweak-row">
          <label>Animazioni</label>
          <div className={`tweak-toggle${tweaks.animations?' on':''}`} onClick={()=>{
            const v=!tweaks.animations;
            setTweaks(t=>({...t,animations:v}));
            window.parent.postMessage({type:'__edit_mode_set_keys',edits:{animations:v}},'*');
          }}/>
        </div>
        <div className="tweak-row">
          <label>Densità</label>
          <select value={tweaks.density} onChange={e=>{
            const d=e.target.value;
            setTweaks(t=>({...t,density:d}));
            window.parent.postMessage({type:'__edit_mode_set_keys',edits:{density:d}},'*');
          }}>
            <option value="compact">Compatta</option>
            <option value="normal">Normale</option>
            <option value="spacious">Spaziosa</option>
          </select>
        </div>
        <div style={{marginTop:10, paddingTop:10, borderTop:`0.5px solid ${T.border}`}}>
          <button onClick={()=>setShowNewRound(true)} style={{
            width:'100%', padding:'8px', borderRadius:6,
            background:T.goldDim, border:`0.5px solid ${T.gold}`,
            color:T.gold, fontSize:12, fontWeight:600, cursor:'pointer',
          }}>Apri nuovo round</button>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
